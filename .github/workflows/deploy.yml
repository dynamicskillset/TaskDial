name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            # Clone repo if first run
            if [ ! -d /opt/chronotasker/repo/.git ]; then
              git clone https://github.com/${{ github.repository }}.git /opt/chronotasker/repo
            fi

            # Run the deploy script
            cd /opt/chronotasker/repo
            export VITE_API_TOKEN="${{ secrets.VITE_API_TOKEN }}"
            bash deploy/deploy.sh
