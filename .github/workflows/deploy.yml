name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            chronotasker-app/package-lock.json
            server/package-lock.json

      - name: Build frontend
        env:
          VITE_API_TOKEN: ${{ secrets.VITE_API_TOKEN }}
        run: |
          cd chronotasker-app
          npm ci
          npm run build

      - name: Build server
        run: |
          cd server
          npm ci
          npm run build

      - name: Install SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Deploy frontend to VPS
        run: |
          rsync -az --delete -e "ssh -o StrictHostKeyChecking=no" chronotasker-app/dist/ root@${{ secrets.VPS_HOST }}:/opt/chronotasker/frontend/
          ssh -o StrictHostKeyChecking=no root@${{ secrets.VPS_HOST }} 'cp -r /opt/chronotasker/frontend/* /opt/ghost/sites/chronotasker/'

      - name: Deploy server to VPS
        run: |
          rsync -az --delete -e "ssh -o StrictHostKeyChecking=no" server/dist/ root@${{ secrets.VPS_HOST }}:/opt/chronotasker/server/dist/
          rsync -az -e "ssh -o StrictHostKeyChecking=no" server/package.json server/package-lock.json root@${{ secrets.VPS_HOST }}:/opt/chronotasker/server/

      - name: Install dependencies and restart on VPS
        run: |
          ssh -o StrictHostKeyChecking=no root@${{ secrets.VPS_HOST }} 'bash -s' <<'SCRIPT'
          set -e
          cd /opt/chronotasker/server
          npm install --production
          pm2 restart chronotasker
          pm2 save
          echo "=== Deploy complete ==="
          SCRIPT
