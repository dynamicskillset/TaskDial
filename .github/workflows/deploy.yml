name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            app/package-lock.json
            server/package-lock.json

      - name: Build frontend
        run: |
          cd app
          npm ci
          npm run build

      - name: Build server
        run: |
          cd server
          npm ci
          npm run build

      - name: Install SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Deploy frontend to VPS
        run: |
          rsync -az --delete -e "ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=30" app/dist/ root@${{ secrets.VPS_HOST }}:/opt/taskdial/frontend/
          ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=30 root@${{ secrets.VPS_HOST }} 'mkdir -p /opt/ghost/sites/taskdial && cp -r /opt/taskdial/frontend/. /opt/ghost/sites/taskdial/'

      - name: Deploy server to VPS
        run: |
          rsync -az --delete -e "ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=30" server/dist/ root@${{ secrets.VPS_HOST }}:/opt/taskdial/server/dist/
          rsync -az -e "ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=30" server/package.json server/package-lock.json root@${{ secrets.VPS_HOST }}:/opt/taskdial/server/

      - name: Install dependencies and restart on VPS
        run: |
          ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=30 root@${{ secrets.VPS_HOST }} 'bash -s' <<'SCRIPT'
          set -e
          cd /opt/chronotasker/server
          # Only run npm install if package-lock.json changed (avoids slow native recompile)
          NEW_HASH=$(md5sum package-lock.json | cut -d' ' -f1)
          OLD_HASH=$(cat .package-lock-hash 2>/dev/null || echo "")
          if [ "$NEW_HASH" != "$OLD_HASH" ]; then
            echo "package-lock.json changed, running npm install..."
            npm install --production
            echo "$NEW_HASH" > .package-lock-hash
          else
            echo "Dependencies unchanged, skipping npm install."
          fi
          pm2 restart taskdial
          pm2 save
          echo "=== Deploy complete ==="
          SCRIPT
